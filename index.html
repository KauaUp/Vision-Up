<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vision Up</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="top-bar">LANÇAMENTOS VISION UP</div>

  <header class="header">
    <div class="header-top">
      <button class="menu-btn" aria-label="Menu">☰</button>

      <div class="logo">
        <img src="./vision-up-banner.png" alt="Vision Up">
      </div>

      <div class="header-icons">
        <button class="icon-btn" aria-label="Usuário">👤</button>
        <button class="icon-btn" aria-label="Carrinho">🛒</button>
      </div>
    </div>

    <div class="search-box">
      <input type="text" placeholder="O que você está buscando?">
      <button aria-label="Pesquisar">⌕</button>
    </div>
  </header>

  <section class="benefits">
    <div class="benefit-card">★ QUALIDADE PREMIUM</div>
    <div class="benefit-card">⚡ ATENDIMENTO RÁPIDO</div>
    <div class="benefit-card">🛡 LOJA DE CONFIANÇA</div>
  </section>
</body>
</html>
