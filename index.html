<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vision Up</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }

    body { background:#000; color:#fff; }

    header {
      display:flex;
      justify-content:flex-end;
      align-items:center;
      padding:20px 8%;
      border-bottom:1px solid rgba(212,175,55,0.2);
    }

    .icons { display:flex; gap:15px; }

    .icon-btn {
      border:1px solid #d4af37;
      background:transparent;
      color:#d4af37;
      width:40px; height:40px;
      border-radius:50%;
      cursor:pointer;
    }

    .hero {
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:80px 20px;
    }

    .hero img {
      max-width:420px;
      width:80%;
      margin-bottom:20px;
    }

    .search-box {
      width:min(500px, 90%);
      display:flex;
      border:1px solid #d4af37;
      border-radius:30px;
      overflow:hidden;
      background:#fff;
    }

    .search-box input {
      flex:1;
      padding:14px;
      border:none;
      outline:none;
      color:#000;
    }

    .search-box button {
      background:#d4af37;
      border:none;
      padding:0 20px;
      cursor:pointer;
    }

    .products {
      padding:40px 8%;
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(200px,1fr));
      gap:20px;
    }

    .card {
      background:#111;
      border:1px solid rgba(212,175,55,0.2);
      border-radius:10px;
      padding:15px;
      text-align:center;
    }

    .card img {
      width:100%;
      border-radius:8px;
      margin-bottom:10px;
    }

    .card h3 { font-size:16px; margin-bottom:8px; }

    .card button {
      background:#d4af37;
      border:none;
      padding:10px;
      width:100%;
      border-radius:20px;
      cursor:pointer;
      margin-top:10px;
    }

    footer {
      text-align:center;
      padding:20px;
      border-top:1px solid rgba(212,175,55,0.2);
      color:#aaa;
    }
  </style>
</head>
<body>

<header>
  <div class="icons">
    <button class="icon-btn">👤</button>
    <button class="icon-btn">🛒</button>
  </div>
</header>

<section class="hero">
  <!-- COLOQUE SUA LOGO AQUI -->
  <img src="logo.png" alt="Vision Up Logo">

  <div class="search-box">
    <input type="text" placeholder="Buscar camisas de futebol...">
    <button>🔍</button>
  </div>
</section>

<section class="products">

  <div class="card">
    <img src="https://via.placeholder.com/300x300" alt="Camisa Time">
    <h3>Camisa Tailândia 2026</h3>
    <button>Gostei</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300x300" alt="Camisa Time">
    <h3>Camisa Futebol Premium</h3>
    <button>Gostei</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300x300" alt="Camisa Time">
    <h3>Camisa Importada</h3>
    <button>Gostei</button>
  </div>

</section>

<footer>
  <p>Vision Up © 2026</p>
</footer>

</body>
</html>
