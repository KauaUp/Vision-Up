<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vision Up</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
}

/* TOPO */
header {
  background: #111;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 15px;
}

.logo img {
  height: 45px;
}

.icons {
  font-size: 20px;
}

/* BANNER PRINCIPAL */
.banner {
  position: relative;
}

.banner img {
  width: 100%;
  height: auto;
}

.banner-text {
  position: absolute;
  top: 30%;
  left: 10%;
}

.banner-text h1 {
  font-size: 35px;
  margin: 0;
}

.banner-text p {
  color: red;
  font-size: 18px;
}

/* PRODUTOS */
.container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

.card {
  background: #111;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.price {
  color: gold;
}

button {
  background: red;
  color: white;
  border: none;
  padding: 8px;
  width: 100%;
  border-radius: 5px;
}

/* WHATSAPP FIXO */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: green;
  padding: 15px;
  border-radius: 50%;
  color: white;
  text-decoration: none;
}
</style>

</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png">
  </div>

  <div class="icons">
    🔍 🛒
  </div>
</header>

<!-- BANNER -->
<div class="banner">
  <img src="banner.png">

  <div class="banner-text">
    <h1>TAILANDESA</h1>
    <p>PRONTA ENTREGA</p>
  </div>
</div>

<!-- PRODUTOS -->
<div class="container">

  <div class="card">
    <img src="produto1.png">
    <h4>Cruzeiro 25/26</h4>
    <p class="price">R$ 89,90</p>
    <button>Comprar</button>
  </div>

  <div class="card">
    <img src="produto2.png">
    <h4>Flamengo 25/26</h4>
    <p class="price">R$ 99,90</p>
    <button>Comprar</button>
  </div>

</div>

<a class="whatsapp" href="https://wa.me/5599999999999">💬</a>

</body>
</html>
