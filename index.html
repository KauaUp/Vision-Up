<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vision Up - Camisas de Futebol</title>
  <meta name="description" content="Vision Up - Loja de camisas de futebol tailandesas premium com envio para todo o Brasil." />

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', Arial, sans-serif;
    }

    body {
      color: #fff;
      background:
        radial-gradient(circle at 12% 18%, rgba(212,175,55,0.10), transparent 24%),
        radial-gradient(circle at 88% 10%, rgba(255,255,255,0.035), transparent 22%),
        linear-gradient(135deg, #080808 0%, #111111 45%, #050505 100%);
      background-attachment: fixed;
    }

    header {
      width: 100%;
      padding: 18px 7%;
      border-bottom: 1px solid rgba(212, 175, 55, 0.25);
      background: rgba(5, 5, 5, 0.88);
      backdrop-filter: blur(10px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      position: relative;
    }

    .menu-btn {
      width: 44px;
      height: 44px;
      border: 1px solid rgba(212,175,55,0.35);
      background: rgba(255,255,255,0.03);
      color: #fff;
      border-radius: 12px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
      backdrop-filter: blur(6px);
    }

    .menu-btn:hover {
      background: #d4af37;
      color: #000;
      transform: translateY(-2px);
    }

    .menu-btn:hover {
      background: #d4af37;
      color: #000;
    }

    .side-menu {
      position: fixed;
      top: 0;
      left: -290px;
      width: 270px;
      height: 100vh;
      background: #050505;
      border-right: 1px solid rgba(212, 175, 55, 0.35);
      padding: 75px 25px 25px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      transition: 0.3s;
      z-index: 999;
      box-shadow: 10px 0 30px rgba(0,0,0,0.5);
    }

    .side-menu.active {
      left: 0;
    }

    .side-menu a {
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.12);
      padding: 10px 0 13px;
      letter-spacing: 0.2px;
    }

    .menu-title {
      color: #d4af37;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .side-menu a:hover {
      color: #d4af37;
    }

    .close-menu {
      position: absolute;
      top: 18px;
      right: 18px;
      background: transparent;
      border: none;
      color: #d4af37;
      font-size: 34px;
      cursor: pointer;
    }

    /* logo agora vai na hero */
    .hero-logo {
      position: relative;
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 8px;
      text-transform: uppercase;
      font-family: 'Orbitron', sans-serif;
      text-align: center;
      padding: 10px 20px;
      z-index: 1;
    }

    /* efeito atrás da logo */
    .hero-logo::before {
      content: "";
      position: absolute;
      inset: -10px -25px;
      background: radial-gradient(circle, rgba(212,175,55,0.25), transparent 70%);
      filter: blur(20px);
      z-index: -1;
    }

    .hero-logo .vision {
      color: #ffffff;
    }

    .hero-logo .up {
      color: #d4af37;
      text-shadow: 0 0 12px rgba(212,175,55,0.6), 0 0 30px rgba(212,175,55,0.4);
    }

    .hero-logo .vision {
      color: #ffffff;
    }

    .hero-logo .up {
      color: #d4af37;
      text-shadow: 0 0 12px rgba(212,175,55,0.5), 0 0 25px rgba(212,175,55,0.3);
    }

    .hero-logo .vision {
      color: #ffffff;
    }

    .hero-logo .up {
      color: #d4af37;
      text-shadow: 0 0 15px rgba(212,175,55,0.4);
    }

    .icons {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .icon-box {
      text-align: center;
      color: #fff;
      font-size: 12px;
      position: relative;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border: 1px solid rgba(212,175,55,0.35);
      background: rgba(255,255,255,0.03);
      color: #fff;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
      backdrop-filter: blur(6px);
    }

    .icon-btn:hover {
      background: #d4af37;
      color: #000;
      transform: translateY(-2px);
    }

    .icon-btn:hover {
      background: #d4af37;
      color: #000;
    }

    .cart-count {
      position: absolute;
      top: -6px;
      right: 5px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #d4af37;
      color: #000;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero {
      min-height: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      padding: 60px 20px;
      background: transparent;
      position: relative;
    }


    .hero-images img {
      width: 140px;
      height: 140px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid rgba(212,175,55,0.3);
      transition: 0.3s;
    }

    .hero-images img:hover {
      transform: scale(1.05);
      border-color: #d4af37;
    }

    .search-box {
      width: min(620px, 92%);
      display: flex;
      border: 1px solid #d4af37;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 0 25px rgba(212, 175, 55, 0.12);
    }

    .search-box input {
      flex: 1;
      padding: 16px 18px;
      border: none;
      outline: none;
      color: #000;
      font-size: 15px;
    }

    .search-box button {
      width: 70px;
      border: none;
      background: #d4af37;
      color: #000;
      font-size: 22px;
      cursor: pointer;
    }

    .benefits {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      padding: 28px 7%;
      border-top: 1px solid rgba(212, 175, 55, 0.08);
      border-bottom: 1px solid rgba(212, 175, 55, 0.08);
      background: rgba(0,0,0,0.22);
      backdrop-filter: blur(8px);
    }

    .benefit {
      color: #f1f1f1;
      font-size: 13px;
      padding: 10px 18px;
      border-radius: 30px;
      background: linear-gradient(145deg, rgba(255,255,255,0.04), rgba(0,0,0,0.4));
      border: 1px solid rgba(212,175,55,0.12);
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }

    

    .section-title {
      padding: 35px 7% 10px;
      font-size: 26px;
      font-weight: 700;
    }

    .section-title span {
      border-bottom: 3px solid #d4af37;
      padding-bottom: 6px;
    }

    .products {
      padding: 25px 7% 70px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 320px));
      gap: 22px;
      justify-content: center;
    }

    .product-card {
      background: #111;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      overflow: hidden;
      transition: 0.2s;
      width: 100%;
      max-width: 280px;
    }

    .product-card:hover {
      transform: translateY(-3px);
      border-color: rgba(212,175,55,0.5);
    }

    .product-image {
      width: 100%;
      height: 260px;
      background: radial-gradient(circle at center, #0f2a5c, #05070d 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .product-image img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
    }

    .product-info {
      padding: 14px;
    }

    .product-info h3 {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .product-meta {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 8px;
    }

    .price {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
    }

    .stock {
      font-size: 12px;
      color: #d4af37;
      margin-bottom: 10px;
    }

    .add-cart {
      width: 100%;
      background: #d4af37;
      color: #000;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }

    .add-cart:hover {
      opacity: 0.9;
    }

    footer {
      text-align: center;
      padding: 25px;
      border-top: 1px solid rgba(212, 175, 55, 0.25);
      color: #aaa;
      font-size: 14px;
    }

    @media (max-width: 800px) {
      .topbar {
        justify-content: space-between;
      }

      .logo-area img {
        height: 58px;
        max-width: 190px;
      }

      .icon-box div {
        display: none;
      }

      .icons {
        gap: 10px;
      }

      .hero {
        padding: 45px 15px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="topbar">
      <button class="menu-btn" onclick="toggleMenu()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"/>
        </svg>
      </button>

      <div class="side-menu" id="sideMenu">
        <button class="close-menu" onclick="toggleMenu()">×</button>

        <p class="menu-title">Menu</p>

        <a href="#">Início</a>
        <a href="#produtos">Times</a>
        <a href="#">Seleções</a>
        <a href="#">Promoções</a>
        <a href="#">Suporte</a>
      </div>

      

      <div class="icons">
        <div class="icon-box">
          <button class="icon-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/></svg>
          </button>
          <div>Conta</div>
        </div>

        <div class="icon-box">
          <button class="icon-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2S15.9 22 17 22s2-.9 2-2-.9-2-2-2zM7.2 14h9.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49a1 1 0 00-.87-1.48H6.21l-.94-2H1v2h2l3.6 7.59-1.35 2.44C4.52 16.37 5.48 18 7 18h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12L7.2 14z"/></svg>
          </button>
          <span class="cart-count" id="cartCount">0</span>
          <div>Carrinho</div>
        </div>
      </div>
    </div>
  </header>

  

  <section class="hero">

    <div class="hero-logo">
      <span class="vision">Vision</span> <span class="up">Up</span>
    </div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="">
      <button onclick="searchProduct()">🔍</button>
    </div>

  </section>

  <section class="benefits">
    <div class="benefit">🔥 Mais vendidos</div>
    <div class="benefit">⚡ Lançamentos</div>
    <div class="benefit">💎 Premium</div>
    <div class="benefit">🏆 Times famosos</div>
  </section>
  

  <section class="products">
    <div class="product-card card" onclick="openProduct()" style="cursor:pointer;" data-name="cruzeiro temporada 25 26 tamanho g camisa futebol">

      <div class="product-image">
        <img src="principal.png" alt="Camisa Cruzeiro">
      </div>

      <div class="product-info">
        <h3>CAMISA DO CRUZEIRO 25/26</h3>
        

        <div class="price">R$ 95,00</div>
        

        
      </div>
    </div>
  </section>

  <footer>
    <p>© 2026 Vision Up - Camisas de Futebol</p>
  </footer>

  <script>
    let cart = 0;

    function addToCart() {
      cart++;
      document.getElementById('cartCount').textContent = cart;
    }

    function searchProduct() {
      const input = document.getElementById('searchInput').value.toLowerCase();
      const cards = document.querySelectorAll('.card');

      cards.forEach(card => {
        const name = card.getAttribute('data-name').toLowerCase();
        card.style.display = name.includes(input) || input === '' ? 'block' : 'none';
      });
    }

    function toggleMenu() {
      document.getElementById('sideMenu').classList.toggle('active');
    }
  </script>



<!-- MODAL PRODUTO -->
<div id="productModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); align-items:center; justify-content:center; z-index:999;">
  <div style="background:#111; padding:20px; border-radius:12px; max-width:380px; width:90%;">

    <!-- IMAGENS -->
    <div style="display:flex; gap:10px; margin-bottom:15px;">
      <img src="cruzeiro1.png" style="width:50%; border-radius:8px;">
      <img src="cruzeiro2.png" style="width:50%; border-radius:8px;">
    </div>

    <h3 style="margin-bottom:10px;">CAMISA DO CRUZEIRO 25/26</h3>

    <div style="display:flex; gap:10px; margin-bottom:15px;">
      <button style="padding:8px 12px; border:1px solid #d4af37; background:transparent; color:#fff;">G</button>
    </div>

    <div style="font-size:20px; margin-bottom:10px;">R$ 95,00</div>

    <div style="font-size:13px; color:#d4af37; margin-bottom:15px;">Estoque: 1 unidade</div>

    <button onclick="addToCart(); closeProduct()" style="width:100%; padding:10px; background:#d4af37; border:none; border-radius:8px; font-weight:bold;">Adicionar ao carrinho</button>

    <button onclick="closeProduct()" style="margin-top:10px; width:100%; background:none; border:none; color:#aaa;">Fechar</button>
  </div>
</div>

<script>
function openProduct(){
  document.getElementById('productModal').style.display='flex';
}

function closeProduct(){
  document.getElementById('productModal').style.display='none';
}
</script>

</body>
</html>
